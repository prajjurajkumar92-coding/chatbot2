<!DOCTYPE html>
<html>
<head>
    <title>Gemini Chat</title>
</head>
<body>

<h2>Ask AI</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="question" placeholder="Ask something..." required>
    <button type="submit">Send</button>
</form>

<h3>Response:</h3>
<p>{{ response }}</p>

</body>
</html>
